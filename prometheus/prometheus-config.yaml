apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: 'users-api'

        metrics_path: /metrics

        static_configs:
          - targets: ['users-api:80']

      - job_name: 'catalog-api'

        metrics_path: /metrics

        static_configs:
          - targets: ['catalog-api:80']